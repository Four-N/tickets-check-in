<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>สแกน QR เช็คอิน</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111b2e; --muted:#93a4c7; --text:#eaf0ff;
      --ok:#1d6b3a; --bad:#7a1d1d; --warn:#6b5b1d;
      --btn:#2a6df4; --btn2:#33415f; --border:rgba(255,255,255,.12);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #122043, var(--bg));
      color:var(--text); padding:16px;
    }
    .wrap{ max-width:560px; margin:0 auto; }
    .title{ font-size:20px; font-weight:800; margin:8px 0 14px; }
    .card{
      background:rgba(17,27,46,.9);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }
    label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; }
    input{
      width:100%;
      padding:14px 12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.2);
      color:var(--text);
      outline:none;
    }
    input::placeholder{ color:rgba(234,240,255,.45); }
    .row{ display:flex; gap:10px; margin-top:12px; }
    button{
      width:100%;
      padding:14px 12px;
      font-size:16px;
      font-weight:700;
      border-radius:12px;
      border:1px solid var(--border);
      cursor:pointer;
      color:var(--text);
      background: var(--btn2);
    }
    button[disabled]{ opacity:.55; cursor:not-allowed; }
    .primary{ background: var(--btn); border-color: rgba(42,109,244,.4); }
    .danger{ background:#7d2c2c; border-color: rgba(125,44,44,.5); }
    .status{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      display:none;
      white-space:pre-line;
      border:1px solid var(--border);
    }
    .status.ok{ display:block; background:rgba(29,107,58,.25); }
    .status.bad{ display:block; background:rgba(122,29,29,.25); }
    .status.warn{ display:block; background:rgba(107,91,29,.25); }
    #reader{
      margin-top:12px;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--border);
      background:#000;
    }
    .mini{
      margin-top:8px;
      font-size:12px;
      color:rgba(234,240,255,.55);
      word-break: break-all;
    }
    code{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">สแกน QR เช็คอิน</div>

    <div class="card">
      <label>ชื่อผู้เช็คอิน (ทีมงาน)</label>
      <input id="checker" placeholder="เช่น ทีม A / ชื่อเล่น" autocomplete="name"/>

      <label>รหัสตั๋ว (สแกนแล้วจะขึ้นเอง)</label>
      <input id="ticketId" placeholder="TICKET-XXXXXXXX" autocapitalize="characters" />

      <div class="row">
        <button class="primary" id="btnStart" onclick="startScan()">📷 เริ่มสแกน</button>
        <button id="btnStop" onclick="stopScan()">⏹ หยุดสแกน</button>
      </div>

      <div class="row">
        <button id="btnSwitch" onclick="switchCamera()">🔁 สลับกล้อง</button>
        <button class="primary" id="btnCheckin" onclick="submitCheckin()">✅ เช็คอิน</button>
      </div>

      <div class="row">
        <button class="danger" onclick="clearAll()">🧹 ล้าง</button>
      </div>

      <div id="result" class="status"></div>

      <div id="reader"></div>
      <div class="mini" id="scanState">สถานะสแกน: ยังไม่เริ่ม</div>
      <div class="mini">API: <code id="apiText"></code></div>
      <div class="mini">Camera in use: <code id="camText">-</code></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // ✅ ใส่ URL /exec ของ Web App Apps Script ตรงนี้
    const API_URL = 'PUT_YOUR_APPS_SCRIPT_WEBAPP_EXEC_URL_HERE';
    document.getElementById('apiText').textContent = API_URL;

    let qr = null;
    let scanning = false;

    let cameras = [];          // {id,label} list
    let currentCamIndex = 0;   // which camera we are using
    let lastCamId = null;

    function setStatus(msg, type='ok'){
      const el = document.getElementById('result');
      el.className = 'status ' + type;
      el.style.display = 'block';
      el.textContent = msg;
    }

    function setScanState(txt){
      document.getElementById('scanState').textContent = 'สถานะสแกน: ' + txt;
    }

    function setCamText(txt){
      document.getElementById('camText').textContent = txt || '-';
    }

    function disableCheckin(disabled){
      document.getElementById('btnCheckin').disabled = disabled;
    }

    async function requestCameraPermissionPreferBack(){
      // ขอ permission ก่อน เพื่อให้ enumerateDevices เห็น label และ deviceId ชัด
      if (!navigator.mediaDevices?.getUserMedia) return false;
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        stream.getTracks().forEach(t => t.stop());
        return true;
      } catch(e){
        return false;
      }
    }

    function pickBackCameraIndex(list){
      // พยายามเลือกกล้องหลังจาก label
      const idx = list.findIndex(c => /back|rear|environment/i.test(c.label || ''));
      if (idx !== -1) return idx;

      // ถ้าไม่มี label (บางเครื่อง), เดาโดยเลือก "ตัวท้ายสุด" มักเป็นกล้องหลัง
      if (list.length >= 2) return list.length - 1;

      return 0;
    }

    async function refreshCameraList(){
      cameras = await Html5Qrcode.getCameras();
      if (!Array.isArray(cameras) || cameras.length === 0) return false;

      currentCamIndex = pickBackCameraIndex(cameras);
      return true;
    }

    async function startScan(){
      if (scanning) return;

      document.getElementById('reader').innerHTML = '';
      setScanState('กำลังขอสิทธิ์กล้อง...');
      setStatus('กำลังขอสิทธิ์กล้อง...', 'warn');

      const ok = await requestCameraPermissionPreferBack();
      if (!ok) {
        setStatus('ไม่สามารถขอสิทธิ์กล้องได้ กรุณาอนุญาต Camera ในเบราว์เซอร์', 'bad');
        setScanState('ไม่ได้รับสิทธิ์กล้อง');
        return;
      }

      const okList = await refreshCameraList();
      if (!okList) {
        setStatus('ไม่พบรายการกล้อง', 'bad');
        setScanState('ไม่พบกล้อง');
        return;
      }

      // start with selected cameraId (back camera)
      await startWithCameraId_(cameras[currentCamIndex]?.id);
    }

    async function startWithCameraId_(camId){
      if (!camId) {
        setStatus('ไม่พบกล้องที่เลือก', 'bad');
        setScanState('ไม่พบกล้อง');
        return;
      }

      try{
        qr = new Html5Qrcode("reader");
        scanning = true;

        lastCamId = camId;
        const label = cameras.find(c => c.id === camId)?.label || camId

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>สแกน QR เช็คอิน</title>

  <style>
    :root{
      --bg:#0b1220; --card:#111b2e; --muted:#93a4c7; --text:#eaf0ff;
      --ok:#1d6b3a; --bad:#7a1d1d; --warn:#6b5b1d;
      --btn:#2a6df4; --btn2:#33415f; --border:rgba(255,255,255,.12);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #122043, var(--bg));
      color:var(--text); padding:16px;
    }
    .wrap{ max-width:560px; margin:0 auto; }
    .title{ font-size:22px; font-weight:900; margin:10px 0 14px; text-align:center; }
    .card{
      background:rgba(17,27,46,.92);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }
    label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; }
    input{
      width:100%; padding:14px 12px; font-size:16px;
      border-radius:12px; border:1px solid var(--border);
      background:rgba(0,0,0,.2); color:var(--text); outline:none;
    }
    .row{ display:flex; gap:10px; margin-top:12px; }
    button{
      width:100%; padding:14px 12px; font-size:16px; font-weight:800;
      border-radius:12px; border:1px solid var(--border);
      cursor:pointer; color:var(--text); background:var(--btn2);
    }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .primary{ background:var(--btn); border-color: rgba(42,109,244,.4); }
    .danger{ background:#7d2c2c; border-color: rgba(125,44,44,.5); }
    .ghost{ background:transparent; }

    .status{
      margin-top:12px; padding:12px; border-radius:12px;
      display:none; white-space:pre-line; border:1px solid var(--border);
    }
    .status.ok{ display:block; background:rgba(29,107,58,.25); }
    .status.bad{ display:block; background:rgba(122,29,29,.25); }
    .status.warn{ display:block; background:rgba(107,91,29,.25); }

    #reader{
      margin-top:12px;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--border);
      background:#000;
      min-height: 320px;
    }
    .mini{ margin-top:10px; font-size:12px; color:rgba(234,240,255,.55); }
    .bar{ display:flex; gap:10px; margin-top:12px; }

    .scannerOverlay{
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .scannerOverlay.active{ display: block; }

    .scannerTopBar{
      position: absolute;
      left: 0; right: 0;
      top: 0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,0));
      pointer-events: none;
    }
    .scannerTopBar .left,
    .scannerTopBar .right{
      display:flex; gap:10px; align-items:center;
      pointer-events: auto;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(10,10,10,.55);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .chipBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(10,10,10,.55);
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .scannerReaderWrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #readerFull{
      width:100%;
      height:100%;
      background:#000;
    }

    .scanFrame{
      position:absolute;
      width:min(78vw, 360px);
      height:min(78vw, 360px);
      border-radius:18px;
      border:2px solid rgba(234,240,255,.65);
      box-shadow: 0 0 0 9999px rgba(0,0,0,.35);
      pointer-events:none;
    }
    .scanHint{
      position:absolute;
      bottom: calc(18px + env(safe-area-inset-bottom));
      left:50%;
      transform:translateX(-50%);
      width:min(92vw, 520px);
      text-align:center;
      color:rgba(234,240,255,.9);
      font-size:13px;
      font-weight:700;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(10,10,10,.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events:none;
    }

    .hide{ display:none !important; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">สแกน QR เช็คอิน</div>

    <div class="card">
      <label>ชื่อผู้เช็คอิน (ทีมงาน)</label>
      <input id="checker" placeholder="เช่น ทีม A / ชื่อเล่น" autocomplete="name"/>

      <label>รหัสตั๋ว</label>
      <input id="ticketId" placeholder="IGNITE-001" autocapitalize="characters" />

      <div class="row">
        <button id="btnScan" class="primary" onclick="startFullScanner()">📷 สแกนเต็มจอ</button>
        <button id="btnStop" onclick="stopScan()">⏹ หยุดสแกน</button>
      </div>

      <div class="row">
        <button id="btnCheckin" class="primary" onclick="submitCheckin()">✅ เช็คอิน</button>
        <button class="danger" onclick="clearAll()">🧹 ล้าง</button>
      </div>

      <div class="bar">
        <button class="ghost" onclick="setApiUrl()">⚙️ ตั้งค่า API</button>
        <button class="ghost" onclick="testApi()">🧪 ทดสอบ API</button>
      </div>

      <div id="result" class="status"></div>

      <div id="reader"></div>

      <div class="mini" id="scanState">สถานะสแกน: ยังไม่เริ่ม</div>
      <div class="mini" id="apiState"></div>
    </div>
  </div>

  <div id="scannerOverlay" class="scannerOverlay" aria-hidden="true">
    <div class="scannerTopBar">
      <div class="left">
        <button class="chipBtn" onclick="exitFullScanner()">✕ ออก</button>
        <div class="chip" id="scannerModeChip">กำลังสแกน…</div>
      </div>
      <div class="right">
        <button class="chipBtn" onclick="toggleTorch()" id="btnTorch">🔦 ไฟฉาย</button>
      </div>
    </div>

    <div class="scannerReaderWrap">
      <div id="readerFull"></div>
      <div class="scanFrame"></div>
      <div class="scanHint">วาง QR ให้อยู่ในกรอบ แล้วรอ 1–2 วินาที</div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let qr = null;
    let scanning = false;
    let usingFullScreen = false;
    let lastDecodedAt = 0;

    const API_KEY = 'TICKET_CHECKIN_API_URL';

    function getApiUrl(){ return localStorage.getItem(API_KEY) || ''; }

    function setApiUrl(){
      const current = getApiUrl();
      const v = prompt('วาง Apps Script Web App URL (/exec):', current);
      if (!v) return;
      localStorage.setItem(API_KEY, v.trim());
      renderApiState();
      setStatus('บันทึก API_URL แล้ว', 'ok');
    }

    function renderApiState(){
      const v = getApiUrl();
      document.getElementById('apiState').textContent = v ? ('API: ตั้งค่าแล้ว') : ('API: ยังไม่ตั้งค่า');
    }

    function setStatus(msg, type='ok'){
      const el = document.getElementById('result');
      el.className = 'status ' + type;
      el.style.display = 'block';
      el.textContent = msg;
    }

    function hideStatus(){
      const el = document.getElementById('result');
      el.style.display = 'none';
    }

    function setScanState(txt){
      document.getElementById('scanState').textContent = 'สถานะสแกน: ' + txt;
      const chip = document.getElementById('scannerModeChip');
      if (chip) chip.textContent = txt;
    }

    function setBusy(b){
      document.getElementById('btnScan').disabled = b;
      document.getElementById('btnStop').disabled = b;
      document.getElementById('btnCheckin').disabled = b;
    }

    function jsonp(url, timeoutMs = 12000){
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const sep = url.includes('?') ? '&' : '?';
        const full = `${url}${sep}callback=${cb}&_=${Date.now()}`;

        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('timeout'));
        }, timeoutMs);

        function cleanup(){
          clearTimeout(timer);
          try { delete window[cb]; } catch(e){ window[cb] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = (data) => {
          if (done) return;
          done = true;
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('script load failed'));
        };

        script.src = full;
        document.body.appendChild(script);
      });
    }

    function buildApiUrl(params){
      const api = getApiUrl();
      if (!api) return '';
      const u = new URL(api);
      Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, v));
      return u.toString();
    }

    async function pickBackCameraId_(){
      const cams = await Html5Qrcode.getCameras();
      if (!cams || !cams.length) return null;
      const back = cams.find(c => /back|rear|environment/i.test(c.label));
      return (back || cams[cams.length - 1]).id;
    }

    function openOverlay_(){
      const overlay = document.getElementById('scannerOverlay');
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      try { document.activeElement && document.activeElement.blur(); } catch(e) {}

      try {
        if (overlay.requestFullscreen) overlay.requestFullscreen();
        else if (overlay.webkitRequestFullscreen) overlay.webkitRequestFullscreen();
      } catch(e) {}
    }

    function closeOverlay_(){
      const overlay = document.getElementById('scannerOverlay');
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';

      try {
        if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitFullscreenElement && document.webkitExitFullscreen) document.webkitExitFullscreen();
      } catch(e) {}
    }

    async function startFullScanner(){
      if (scanning) return;

      usingFullScreen = true;
      openOverlay_();
      document.getElementById('reader').classList.add('hide');
      hideStatus();
      document.getElementById('readerFull').innerHTML = '';

      setScanState('กำลังเปิดกล้อง...');
      setStatus('กำลังเปิดกล้อง...', 'warn');

      try{
        qr = new Html5Qrcode("readerFull");
        scanning = true;

        const camId = await pickBackCameraId_();

        const config = {
          fps: 20,
          qrbox: { width: 260, height: 260 },
          disableFlip: true,
          experimentalFeatures: { useBarCodeDetectorIfSupported: true }
        };

        const videoConstraints = {
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        };

        await qr.start(
          camId ? { deviceId: { exact: camId } } : videoConstraints,
          { ...config, videoConstraints },
          async (decodedText) => {
            const now = Date.now();
            if (now - lastDecodedAt < 800) return;
            lastDecodedAt = now;

            const val = (decodedText || '').trim();
            if (!val) return;

            document.getElementById('ticketId').value = val;
            if (navigator.vibrate) navigator.vibrate(60);

            setScanState('สแกนสำเร็จ');
            stopScan();
            submitCheckin();
          }
        );

        setScanState('กำลังสแกน...');
      } catch(err){
        scanning = false;
        setScanState('เปิดกล้องไม่ได้');
        closeOverlay_();
        document.getElementById('reader').classList.remove('hide');
        setStatus('เปิดกล้องไม่ได้\n' + String(err), 'bad');
      }
    }

    async function exitFullScanner(){
      usingFullScreen = false;
      await stopScan();
      closeOverlay_();
      document.getElementById('reader').classList.remove('hide');
      setScanState('หยุดแล้ว');
    }

    async function stopScan(){
      try{
        if (qr && scanning) {
          await qr.stop();
          await qr.clear();
        }
      } catch(e) {}
      scanning = false;

      if (usingFullScreen) {
        closeOverlay_();
        usingFullScreen = false;
      }
    }

    function clearAll(){
      document.getElementById('ticketId').value = '';
      hideStatus();
    }

    async function testApi(){
      const url = buildApiUrl({ action: 'ping' });
      if (!url) return setStatus('ยังไม่ได้ตั้งค่า API_URL', 'bad');

      setBusy(true);
      setStatus('กำลังทดสอบ API...', 'warn');

      try{
        const data = await jsonp(url, 8000);
        if (!data?.ok) return setStatus(data?.message || 'ทดสอบไม่ผ่าน', 'bad');
        setStatus('ทดสอบผ่าน: ' + (data.message || 'pong'), 'ok');
      } catch(e){
        setStatus('ทดสอบ API ไม่สำเร็จ: ' + String(e), 'bad');
      } finally {
        setBusy(false);
      }
    }

    async function submitCheckin(){
      const ticketId = document.getElementById('ticketId').value.trim();
      const checker = document.getElementById('checker').value.trim() || 'staff';

      if (!ticketId) return setStatus('กรุณาสแกนหรือกรอกรหัสตั๋วก่อน', 'bad');

      const url = buildApiUrl({ action:'checkin', ticketId, checker });
      if (!url) return setStatus('ยังไม่ได้ตั้งค่า API_URL', 'bad');

      setBusy(true);
      setScanState('กำลังเช็คอิน...');
      setStatus('กำลังเช็คอิน...', 'warn');

      try{
        const data = await jsonp(url, 12000);
        if (!data?.ok) {
          setScanState('เช็คอินไม่สำเร็จ');
          return setStatus(data?.message || 'เช็คอินไม่สำเร็จ', 'bad');
        }

        if (data.already) {
          setScanState('ตั๋วนี้เช็คอินแล้ว');
          return setStatus(
            `⚠️ ${data.message}\nชื่อ: ${data.name || '-'}\nเวลา: ${data.checkedInAt || '-'}\nโดย: ${data.checkedInBy || '-'}`,
            'warn'
          );
        }

        setScanState('เช็คอินสำเร็จ');
        setStatus(
          `✅ ${data.message}\nชื่อ: ${data.name || '-'}\nเวลา: ${data.checkedInAt || '-'}\nโดย: ${data.checkedInBy || '-'}`,
          'ok'
        );

      } catch(e){
        setScanState('เช็คอินผิดพลาด');
        setStatus('เช็คอินผิดพลาด: ' + String(e), 'bad');
      } finally {
        setBusy(false);
      }
    }

    async function toggleTorch(){
      try{
        if (!qr || !scanning) return;
        const track = await getVideoTrack_();
        if (!track) return;

        const cap = track.getCapabilities ? track.getCapabilities() : {};
        if (!cap.torch) {
          setStatus('อุปกรณ์นี้ไม่รองรับไฟฉาย', 'warn');
          return;
        }

        const settings = track.getSettings ? track.getSettings() : {};
        const torchOn = !!settings.torch;

        await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
        document.getElementById('btnTorch').textContent = !torchOn ? '🔦 ปิดไฟฉาย' : '🔦 ไฟฉาย';
      } catch(e){
        setStatus('เปิด/ปิดไฟฉายไม่ได้: ' + String(e), 'warn');
      }
    }

    async function getVideoTrack_(){
      try{
        const videos = document.querySelectorAll('#scannerOverlay video');
        const v = videos && videos[0];
        if (!v || !v.srcObject) return null;
        const tracks = v.srcObject.getVideoTracks();
        return tracks && tracks[0] ? tracks[0] : null;
      } catch(e){
        return null;
      }
    }

    document.addEventListener('fullscreenchange', () => {
      const overlay = document.getElementById('scannerOverlay');
      const active = overlay.classList.contains('active');
      if (active && !document.fullscreenElement) {
        // no-op
      }
    });

    renderApiState();
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>สแกน QR เช็คอิน</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111b2e; --muted:#93a4c7; --text:#eaf0ff;
      --ok:#1d6b3a; --bad:#7a1d1d; --warn:#6b5b1d;
      --btn:#2a6df4; --btn2:#33415f; --border:rgba(255,255,255,.12);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #122043, var(--bg));
      color:var(--text); padding:16px;
    }
    .wrap{ max-width:560px; margin:0 auto; }
    .title{ font-size:22px; font-weight:900; margin:10px 0 14px; text-align:center; }
    .card{
      background:rgba(17,27,46,.92);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }
    label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; }
    input{
      width:100%; padding:14px 12px; font-size:16px;
      border-radius:12px; border:1px solid var(--border);
      background:rgba(0,0,0,.2); color:var(--text); outline:none;
    }
    .row{ display:flex; gap:10px; margin-top:12px; }
    button{
      width:100%; padding:14px 12px; font-size:16px; font-weight:800;
      border-radius:12px; border:1px solid var(--border);
      cursor:pointer; color:var(--text); background:var(--btn2);
    }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .primary{ background:var(--btn); border-color: rgba(42,109,244,.4); }
    .danger{ background:#7d2c2c; border-color: rgba(125,44,44,.5); }
    .ghost{ background:transparent; }
    .status{
      margin-top:12px; padding:12px; border-radius:12px;
      display:none; white-space:pre-line; border:1px solid var(--border);
    }
    .status.ok{ display:block; background:rgba(29,107,58,.25); }
    .status.bad{ display:block; background:rgba(122,29,29,.25); }
    .status.warn{ display:block; background:rgba(107,91,29,.25); }
    #reader{
      margin-top:12px; overflow:hidden; border-radius:14px;
      border:1px solid var(--border); background:#000;
    }
    .mini{ margin-top:10px; font-size:12px; color:rgba(234,240,255,.55); }
    .bar{ display:flex; gap:10px; margin-top:12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">สแกน QR เช็คอิน</div>

    <div class="card">
      <label>ชื่อผู้เช็คอิน (ทีมงาน)</label>
      <input id="checker" placeholder="เช่น ทีม A / ชื่อเล่น" autocomplete="name"/>

      <label>รหัสตั๋ว</label>
      <input id="ticketId" placeholder="TICKET-XXXXXXXX" autocapitalize="characters" />

      <div class="row">
        <button id="btnScan" class="primary" onclick="startScan()">📷 เริ่มสแกน</button>
        <button id="btnStop" onclick="stopScan()">⏹ หยุดสแกน</button>
      </div>

      <div class="row">
        <button id="btnCheckin" class="primary" onclick="submitCheckin()">✅ เช็คอิน</button>
        <button class="danger" onclick="clearAll()">🧹 ล้าง</button>
      </div>

      <div class="bar">
        <button class="ghost" onclick="setApiUrl()">⚙️ ตั้งค่า API</button>
        <button class="ghost" onclick="testApi()">🧪 ทดสอบ API</button>
      </div>

      <div id="result" class="status"></div>

      <div id="reader"></div>
      <div class="mini" id="scanState">สถานะสแกน: ยังไม่เริ่ม</div>
      <div class="mini" id="apiState"></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let qr = null;
    let scanning = false;

    const API_KEY = 'TICKET_CHECKIN_API_URL';
    function getApiUrl(){ return localStorage.getItem(API_KEY) || ''; }
    function setApiUrl(){
      const current = getApiUrl();
      const v = prompt('วาง Apps Script Web App URL (/exec):', current);
      if (!v) return;
      localStorage.setItem(API_KEY, v.trim());
      renderApiState();
      setStatus('บันทึก API_URL แล้ว', 'ok');
    }
    function renderApiState(){
      const v = getApiUrl();
      document.getElementById('apiState').textContent = v ? ('API: ตั้งค่าแล้ว') : ('API: ยังไม่ตั้งค่า');
    }

    function setStatus(msg, type='ok'){
      const el = document.getElementById('result');
      el.className = 'status ' + type;
      el.style.display = 'block';
      el.textContent = msg;
    }
    function setScanState(txt){
      document.getElementById('scanState').textContent = 'สถานะสแกน: ' + txt;
    }
    function setBusy(b){
      document.getElementById('btnScan').disabled = b;
      document.getElementById('btnStop').disabled = b;
      document.getElementById('btnCheckin').disabled = b;
    }

    // ✅ JSONP helper (แก้ CORS)
    function jsonp(url, timeoutMs = 12000){
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const sep = url.includes('?') ? '&' : '?';
        const full = `${url}${sep}callback=${cb}&_=${Date.now()}`;

        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('timeout'));
        }, timeoutMs);

        function cleanup(){
          clearTimeout(timer);
          try { delete window[cb]; } catch(e){ window[cb] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = (data) => {
          if (done) return;
          done = true;
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('script load failed'));
        };

        script.src = full;
        document.body.appendChild(script);
      });
    }

    async function startScan(){
      if (scanning) return;

      document.getElementById('reader').innerHTML = '';
      setScanState('กำลังเปิดกล้อง...');
      setStatus('กำลังเปิดกล้อง...', 'warn');

      try{
        qr = new Html5Qrcode("reader");
        scanning = true;

        // ✅ พยายามบังคับกล้องหลัง
        const cameraConfig = { facingMode: { exact: "environment" } };

        await qr.start(
          cameraConfig,
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decodedText) => {
            const val = (decodedText || '').trim();
            document.getElementById('ticketId').value = val;
            if (navigator.vibrate) navigator.vibrate(60);
            setStatus('สแกนสำเร็จ: ' + val, 'ok');
            setScanState('สแกนสำเร็จ (หยุดอัตโนมัติ)');
            await stopScan();
          }
        );

        setStatus('เปิดกล้องแล้ว กำลังสแกน...', 'ok');
        setScanState('กำลังสแกน...');

      } catch(err1){
        // fallback
        try{
          if (qr) { try { await qr.stop(); } catch(e){} try{ await qr.clear(); }catch(e){} }
          qr = new Html5Qrcode("reader");

          await qr.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            async (decodedText) => {
              const val = (decodedText || '').trim();
              document.getElementById('ticketId').value = val;
              if (navigator.vibrate) navigator.vibrate(60);
              setStatus('สแกนสำเร็จ: ' + val, 'ok');
              setScanState('สแกนสำเร็จ (หยุดอัตโนมัติ)');
              await stopScan();
            }
          );

          setStatus('เปิดกล้องแล้ว กำลังสแกน...', 'ok');
          setScanState('กำลังสแกน...');
        } catch(err2){
          scanning = false;
          setStatus('เปิดกล้องไม่ได้\n' + String(err2 || err1), 'bad');
          setScanState('เปิดกล้องไม่ได้');
        }
      }
    }

    async function stopScan(){
      try{
        if (qr && scanning) {
          await qr.stop();
          await qr.clear();
        }
      } catch(e) {}
      scanning = false;
      setScanState('หยุดแล้ว');
    }

    function clearAll(){
      document.getElementById('ticketId').value = '';
      document.getElementById('result').style.display = 'none';
    }

    function buildApiUrl(params){
      const api = getApiUrl();
      if (!api) return '';
      const u = new URL(api);
      Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, v));
      return u.toString();
    }

    async function testApi(){
      const url = buildApiUrl({ action: 'ping' });
      if (!url) return setStatus('ยังไม่ได้ตั้งค่า API_URL', 'bad');

      setBusy(true);
      setStatus('กำลังทดสอบ API...', 'warn');

      try{
        const data = await jsonp(url, 8000);
        if (!data?.ok) return setStatus(data?.message || 'ทดสอบไม่ผ่าน', 'bad');
        setStatus('ทดสอบผ่าน: ' + (data.message || 'pong'), 'ok');
      } catch(e){
        setStatus('ทดสอบ API ไม่สำเร็จ: ' + String(e), 'bad');
      } finally {
        setBusy(false);
      }
    }

    async function submitCheckin(){
      const ticketId = document.getElementById('ticketId').value.trim();
      const checker = document.getElementById('checker').value.trim() || 'staff';
      if (!ticketId) return setStatus('กรุณาสแกนหรือกรอกรหัสตั๋วก่อน', 'bad');

      const url = buildApiUrl({ action:'checkin', ticketId, checker });
      if (!url) return setStatus('ยังไม่ได้ตั้งค่า API_URL', 'bad');

      setBusy(true);
      setStatus('กำลังเช็คอิน...', 'warn');

      try{
        const data = await jsonp(url, 12000);
        if (!data?.ok) return setStatus(data?.message || 'เช็คอินไม่สำเร็จ', 'bad');

        if (data.already) {
          return setStatus(
            `⚠️ ${data.message}\nชื่อ: ${data.name || '-'}\nเวลา: ${data.checkedInAt || '-'}\nโดย: ${data.checkedInBy || '-'}`,
            'warn'
          );
        }

        setStatus(
          `✅ ${data.message}\nชื่อ: ${data.name || '-'}\nเวลา: ${data.checkedInAt || '-'}\nโดย: ${data.checkedInBy || '-'}`,
          'ok'
        );
      } catch(e){
        setStatus('เช็คอินผิดพลาด: ' + String(e), 'bad');
      } finally {
        setBusy(false);
      }
    }

    renderApiState();
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>สแกน QR เช็คอิน</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111b2e; --muted:#93a4c7; --text:#eaf0ff;
      --ok:#1d6b3a; --bad:#7a1d1d; --warn:#6b5b1d;
      --btn:#2a6df4; --btn2:#33415f; --border:rgba(255,255,255,.12);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #122043, var(--bg));
      color:var(--text); padding:16px;
    }
    .wrap{ max-width:560px; margin:0 auto; }
    .title{ font-size:20px; font-weight:800; margin:8px 0 14px; }
    .card{
      background:rgba(17,27,46,.9);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }
    label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; }
    input{
      width:100%;
      padding:14px 12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.2);
      color:var(--text);
      outline:none;
    }
    input::placeholder{ color:rgba(234,240,255,.45); }
    .row{ display:flex; gap:10px; margin-top:12px; }
    button{
      width:100%;
      padding:14px 12px;
      font-size:16px;
      font-weight:700;
      border-radius:12px;
      border:1px solid var(--border);
      cursor:pointer;
      color:var(--text);
      background: var(--btn2);
    }
    button[disabled]{ opacity:.55; cursor:not-allowed; }
    .primary{ background: var(--btn); border-color: rgba(42,109,244,.4); }
    .danger{ background:#7d2c2c; border-color: rgba(125,44,44,.5); }
    .hint{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px dashed rgba(255,255,255,.18);
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .status{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      display:none;
      white-space:pre-line;
      border:1px solid var(--border);
    }
    .status.ok{ display:block; background:rgba(29,107,58,.25); }
    .status.bad{ display:block; background:rgba(122,29,29,.25); }
    .status.warn{ display:block; background:rgba(107,91,29,.25); }
    #reader{
      margin-top:12px;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--border);
      background:#000;
    }
    .mini{
      margin-top:8px;
      font-size:12px;
      color:rgba(234,240,255,.55);
    }
    code{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">สแกน QR เช็คอิน</div>

    <div class="card">
      <label>ชื่อผู้เช็คอิน (ทีมงาน)</label>
      <input id="checker" placeholder="เช่น ทีม A / ชื่อเล่น" autocomplete="name"/>

      <label>รหัสตั๋ว (สแกนแล้วจะขึ้นเอง)</label>
      <input id="ticketId" placeholder="TICKET-XXXXXXXX" autocapitalize="characters" />

      <div class="row">
        <button class="primary" id="btnStart" onclick="startScan()">📷 เริ่มสแกน</button>
        <button id="btnStop" onclick="stopScan()">⏹ หยุดสแกน</button>
      </div>

      <div class="row">
        <button class="primary" id="btnCheckin" onclick="submitCheckin()">✅ เช็คอิน</button>
        <button class="danger" onclick="clearAll()">🧹 ล้าง</button>
      </div>

      <div id="result" class="status"></div>

      <div class="hint">
        ถ้าเปิดกล้องไม่ได้:
        <br>• iPhone แนะนำ Safari
        <br>• กด <b>aA</b> บนแถบ URL → Website Settings → Camera: <b>Allow</b>
        <br>• อย่าเปิดผ่าน in-app browser (เช่น LINE)
      </div>

      <div id="reader"></div>
      <div class="mini" id="scanState">สถานะสแกน: ยังไม่เริ่ม</div>
      <div class="mini">API: <code id="apiText"></code></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // ✅ ใส่ URL /exec ของ Web App Apps Script ตรงนี้
    const API_URL = 'PUT_YOUR_APPS_SCRIPT_WEBAPP_EXEC_URL_HERE';

    document.getElementById('apiText').textContent = API_URL;

    let qr = null;
    let scanning = false;

    function setStatus(msg, type='ok'){
      const el = document.getElementById('result');
      el.className = 'status ' + type;
      el.style.display = 'block';
      el.textContent = msg;
    }

    function setScanState(txt){
      document.getElementById('scanState').textContent = 'สถานะสแกน: ' + txt;
    }

    function disableCheckin(disabled){
      document.getElementById('btnCheckin').disabled = disabled;
    }

    async function preRequestCameraPermission(){
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }});
        stream.getTracks().forEach(t => t.stop());
        return true;
      } catch {
        return false;
      }
    }

    async function startScan(){
      if (scanning) return;

      document.getElementById('reader').innerHTML = '';
      setScanState('กำลังขอสิทธิ์กล้อง...');
      setStatus('กำลังขอสิทธิ์กล้อง...', 'warn');

      const ok = await preRequestCameraPermission();
      if (!ok) {
        setStatus('ยังไม่ได้รับสิทธิ์กล้อง (ไป Allow Camera ใน Browser/Settings)', 'bad');
        setScanState('ไม่ได้รับสิทธิ์กล้อง');
        return;
      }

      try{
        qr = new Html5Qrcode("reader");
        const cameras = await Html5Qrcode.getCameras();

        let cam = cameras?.find(c => /back|rear|environment/i.test(c.label)) || cameras?.[0];
        const camId = cam?.id;
        if (!camId) {
          setStatus('ไม่พบกล้องในอุปกรณ์นี้', 'bad');
          setScanState('ไม่พบกล้อง');
          return;
        }

        scanning = true;
        await qr.start(
          camId,
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decodedText) => {
            const val = (decodedText || '').trim();
            document.getElementById('ticketId').value = val;

            if (navigator.vibrate) navigator.vibrate(60);
            setStatus('สแกนสำเร็จ: ' + val, 'ok');
            setScanState('สแกนสำเร็จ (หยุดอัตโนมัติ)');
            await stopScan();
          }
        );

        setStatus('เปิดกล้องแล้ว กำลังสแกน...', 'ok');
        setScanState('กำลังสแกน...');
      } catch(err){
        scanning = false;
        setStatus('เปิดกล้องไม่ได้\n' + String(err), 'bad');
        setScanState('เปิดกล้องไม่ได้');
      }
    }

    async function stopScan(){
      try{
        if (qr && scanning) {
          await qr.stop();
          await qr.clear();
        }
      } catch {}
      scanning = false;
      setScanState('หยุดแล้ว');
    }

    function clearAll(){
      document.getElementById('ticketId').value = '';
      document.getElementById('result').style.display = 'none';
    }

    async function submitCheckin(){
      const ticketId = document.getElementById('ticketId').value.trim();
      const checkerName = document.getElementById('checker').value.trim();

      if (!ticketId) return setStatus('กรุณาสแกนหรือกรอกรหัสตั๋วก่อน', 'bad');
      if (!API_URL || API_URL.includes('PUT_')) return setStatus('กรุณาตั้งค่า API_URL ให้ถูกต้องก่อน', 'bad');

      disableCheckin(true);
      setStatus('กำลังเช็คอิน... (ถ้าช้าเกิน 12 วิให้ลองใหม่)', 'warn');

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 12000);

      try{
        const r = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticketId, checkerName }),
          signal: controller.signal
        });

        const res = await r.json();

        if (!res?.ok) {
          setStatus(res?.message || 'ผิดพลาด', 'bad');
          return;
        }

        if (res.already) {
          setStatus(
            `⚠️ ${res.message}\nชื่อ: ${res.name || '-'}\nเวลา: ${res.checkedInAt || '-'}\nโดย: ${res.checkedInBy || '-'}`,
            'warn'
          );
          return;
        }

        setStatus(
          `✅ ${res.message}\nชื่อ: ${res.name || '-'}\nเวลา: ${res.checkedInAt || '-'}\nโดย: ${res.checkedInBy || '-'}`,
          'ok'
        );
      } catch (e) {
        setStatus('เช็คอินช้า/ไม่ตอบสนอง (ลองใหม่)\n' + String(e), 'bad');
      } finally {
        clearTimeout(timer);
        disableCheckin(false);
      }
    }
  </script>
</body>
</html>
